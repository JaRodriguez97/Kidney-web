<div class="fixed inset-0 z-50" [ngClass]="{ hidden: !visible }">
	<div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"></div>
	<div class="absolute inset-0 flex items-center justify-center p-4">
		<div
			class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]"
		>
			<div
				class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50"
			>
				<h3 class="text-lg font-bold text-primary">Editar Servicio</h3>
				<button class="text-slate-400 hover:text-secondary" (click)="onClose()">
					<span class="material-symbols-outlined">close</span>
				</button>
			</div>
			<div class="p-6 overflow-y-auto space-y-5">
				<div class="grid grid-cols-2 gap-5">
					<div class="col-span-2">
						<label class="block text-sm font-semibold text-slate-700 mb-1.5"
							>Nombre del Servicio</label
						>
						<input
							class="w-full rounded-xl border-slate-200 text-sm focus:border-primary focus:ring-primary/20"
							type="text"
							value="Consulta Médica General"
						/>
					</div>
					<div>
						<label class="block text-sm font-semibold text-slate-700 mb-1.5"
							>Código Interno</label
						>
						<input
							class="w-full rounded-xl border-slate-200 text-sm focus:border-primary focus:ring-primary/20 bg-slate-50"
							type="text"
							value="GEN-001"
						/>
					</div>
					<div>
						<label class="block text-sm font-semibold text-slate-700 mb-1.5"
							>Precio (COP)</label
						>
						<div class="relative">
							<span class="absolute left-3 top-2 text-slate-500">$</span>
							<input
								class="w-full rounded-xl border-slate-200 text-sm pl-7 focus:border-primary focus:ring-primary/20"
								type="text"
								value="180,000"
							/>
						</div>
					</div>
					<div class="col-span-2">
						<label class="block text-sm font-semibold text-slate-700 mb-1.5"
							>Categorías / Tipo de Proveedor</label
						>
						<div
							class="flex flex-wrap gap-2 p-3 border border-slate-200 rounded-xl bg-slate-50"
						>
							<span
								class="bg-blue-100 text-blue-700 px-2 py-1 rounded-md text-xs font-bold flex items-center gap-1"
							>
								Medicina General
								<button class="hover:text-blue-900">×</button>
							</span>
							<button
								class="text-xs text-primary font-semibold hover:underline px-2"
							>
								+ Añadir
							</button>
						</div>
					</div>
					<div class="col-span-2">
						<label class="block text-sm font-semibold text-slate-700 mb-1.5"
							>Descripción</label
						>
						<textarea
							class="w-full rounded-xl border-slate-200 text-sm focus:border-primary focus:ring-primary/20"
							rows="3"
						>
Consulta inicial para evaluación de estado de salud general y diagnóstico preliminar.</textarea
						>
					</div>
					<div>
						<label class="block text-sm font-semibold text-slate-700 mb-1.5"
							>Tiempo Estimado</label
						>
						<select
							class="w-full rounded-xl border-slate-200 text-sm focus:border-primary focus:ring-primary/20"
						>
							<option>30 minutos</option>
							<option selected="">45 minutos</option>
							<option>60 minutos</option>
						</select>
					</div>
					<div
						class="flex items-center justify-between bg-slate-50 p-3 rounded-xl border border-slate-100"
					>
						<span class="text-sm font-semibold text-slate-700"
							>Estado del Servicio</span
						>
						<div
							class="relative inline-block w-11 h-6 transition duration-200 ease-in-out"
						>
							<input
								class="absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer checked:right-0 checked:border-green-500"
								id="toggle"
								type="checkbox"
							/>
							<label
								class="block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer checked:bg-green-500"
								for="toggle"
							></label>
						</div>
					</div>
				</div>
			</div>
			<div
				class="p-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3"
			>
				<button
					class="px-4 py-2 rounded-lg text-slate-600 font-medium hover:bg-slate-200 transition-colors"
					(click)="onClose()"
				>
					Cancelar
				</button>
				<button
					class="px-4 py-2 rounded-lg bg-primary text-white font-medium hover:bg-primary/90 transition-colors shadow-lg shadow-primary/20"
				>
					Guardar Cambios
				</button>
			</div>
		</div>
	</div>
</div>
