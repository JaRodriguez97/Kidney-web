<div
	*ngIf="successMessage"
	class="mb-4 p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm"
>
	{{ successMessage }}
</div>

<div
	*ngIf="errorMessage"
	class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm"
>
	{{ errorMessage }}
</div>

<form [formGroup]="providerForm" class="grid grid-cols-1 md:grid-cols-2 gap-10">
	<section class="space-y-6">
		<h4
			class="text-primary font-bold text-sm flex items-center gap-2 uppercase tracking-wider"
		>
			<span class="w-1.5 h-6 bg-primary rounded-full"></span>
			DATOS OBLIGATORIOS
		</h4>
		<div class="space-y-4">
			<div>
				<label
					class="block text-[11px] font-bold text-slate-500 mb-1.5 ml-1 uppercase"
					>Primer Nombre*</label
				>
				<input
					class="glass-input-mandatory w-full"
					placeholder="Ej. Carlos"
					type="text"
					formControlName="firstName"
				/>
			</div>
			<div>
				<label
					class="block text-[11px] font-bold text-slate-500 mb-1.5 ml-1 uppercase"
					>Primer Apellido*</label
				>
				<input
					class="glass-input-mandatory w-full"
					placeholder="Ej. Ramírez"
					type="text"
					formControlName="lastName"
				/>
			</div>
			<div>
				<label
					class="block text-[11px] font-bold text-slate-500 mb-1.5 ml-1 uppercase"
					>Correo Institucional*</label
				>
				<input
					class="glass-input-mandatory w-full"
					placeholder="doctor@ejemplo.com"
					type="email"
					formControlName="email"
				/>
			</div>
			<div>
				<label
					class="block text-[11px] font-bold text-slate-500 mb-1.5 ml-1 uppercase"
					>Contraseña*</label
				>
				<input
					class="glass-input-mandatory w-full"
					placeholder="••••••••"
					[type]="showPassword ? 'text' : 'password'"
					formControlName="password"
				/>
			</div>
			<div>
				<label
					class="block text-[11px] font-bold text-slate-500 mb-1.5 ml-1 uppercase"
					>Tipo de Proveedor*</label
				>
				<select
					class="glass-input-mandatory w-full appearance-none"
					formControlName="providerTypeId"
				>
					<option value="" disabled>
						{{
							isLoadingProviderTypes
								? "Cargando tipos..."
								: "Seleccione tipo de proveedor"
						}}
					</option>
					<option *ngFor="let pt of providerTypes" [value]="pt.id">
						{{ pt.name }}
					</option>
				</select>
			</div>
			<div>
				<label
					class="block text-[11px] font-bold text-slate-500 mb-1.5 ml-1 uppercase"
					>Tipo de Documento*</label
				>
				<select
					class="glass-input-mandatory w-full appearance-none"
					formControlName="documentType"
				>
					<option value="CC">Cédula de Ciudadanía</option>
					<option value="CE">Cédula de Extranjería</option>
					<option value="TI">Tarjeta de Identidad</option>
					<option value="PP">Pasaporte</option>
				</select>
			</div>
			<div>
				<label
					class="block text-[11px] font-bold text-slate-500 mb-1.5 ml-1 uppercase"
					>Número de Documento*</label
				>
				<input
					class="glass-input-mandatory w-full"
					placeholder="1098765432"
					type="text"
					formControlName="documentNumber"
				/>
			</div>
		</div>
	</section>

	<section class="space-y-6">
		<h4
			class="text-slate-400 font-bold text-sm flex items-center gap-2 uppercase tracking-wider"
		>
			<span class="w-1.5 h-6 bg-slate-200 rounded-full"></span>
			DATOS OPCIONALES
		</h4>
		<div class="space-y-4">
			<div>
				<label
					class="block text-[11px] font-bold text-slate-400 mb-1.5 ml-1 uppercase"
					>Segundo Nombre</label
				>
				<input
					class="glass-input-optional w-full"
					placeholder="Ej. Andrés"
					type="text"
					formControlName="middleName"
				/>
			</div>
			<div>
				<label
					class="block text-[11px] font-bold text-slate-400 mb-1.5 ml-1 uppercase"
					>Segundo Apellido</label
				>
				<input
					class="glass-input-optional w-full"
					placeholder="Ej. López"
					type="text"
					formControlName="secondLastName"
				/>
			</div>
			<div>
				<label
					class="block text-[11px] font-bold text-slate-400 mb-1.5 ml-1 uppercase"
					>Género</label
				>
				<select
					class="glass-input-optional w-full appearance-none"
					formControlName="gender"
				>
					<option value="">Seleccione género</option>
					<option value="MALE">Masculino</option>
					<option value="FEMALE">Femenino</option>
					<option value="OTHER">Otro</option>
				</select>
			</div>
			<div>
				<label
					class="block text-[11px] font-bold text-slate-400 mb-1.5 ml-1 uppercase"
					>Dirección</label
				>
				<input
					class="glass-input-optional w-full"
					placeholder="Ej. Calle 45 #12-30"
					type="text"
					formControlName="address"
				/>
			</div>
			<div>
				<label
					class="block text-[11px] font-bold text-slate-400 mb-1.5 ml-1 uppercase"
					>Barrio</label
				>
				<input
					class="glass-input-optional w-full"
					placeholder="Ej. Centro"
					type="text"
					formControlName="neighborhood"
				/>
			</div>
			<div>
				<label
					class="block text-[11px] font-bold text-slate-400 mb-1.5 ml-1 uppercase"
					>Comuna</label
				>
				<input
					class="glass-input-optional w-full"
					placeholder="Ej. 3"
					type="number"
					formControlName="commune"
				/>
			</div>
			<div>
				<label
					class="block text-[11px] font-bold text-slate-400 mb-1.5 ml-1 uppercase"
					>Teléfono de Contacto</label
				>
				<input
					class="glass-input-optional w-full"
					placeholder="+57 300 123 45 67"
					type="tel"
					formControlName="phone"
				/>
			</div>
		</div>
	</section>
</form>
