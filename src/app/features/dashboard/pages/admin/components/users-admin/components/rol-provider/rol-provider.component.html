<div
  *ngIf="successMessage"
  class="mb-4 p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm"
>
  {{ successMessage }}
</div>

<div
  *ngIf="errorMessage"
  class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm"
>
  {{ errorMessage }}
</div>

<form
  [formGroup]="providerForm"
  (ngSubmit)="onSubmit()"
  class="grid grid-cols-1 md:grid-cols-2 gap-10"
>
  <section class="space-y-6">
    <h4
      class="text-primary font-bold text-sm flex items-center gap-2 uppercase tracking-wider"
    >
      <span class="w-1.5 h-6 bg-primary rounded-full"></span>
      DATOS OBLIGATORIOS
    </h4>
    <div class="space-y-4">
      <div>
        <label
          class="block text-[11px] font-bold text-slate-500 mb-1.5 ml-1 uppercase"
          >Primer Nombre*</label
        >
        <input
          class="glass-input-mandatory w-full"
          placeholder="Ej. Carlos"
          type="text"
          formControlName="firstName"
        />
      </div>
      <div>
        <label
          class="block text-[11px] font-bold text-slate-500 mb-1.5 ml-1 uppercase"
          >Primer Apellido*</label
        >
        <input
          class="glass-input-mandatory w-full"
          placeholder="Ej. Mendoza"
          type="text"
          formControlName="lastName"
        />
      </div>
      <div>
        <label
          class="block text-[11px] font-bold text-slate-500 mb-1.5 ml-1 uppercase"
          >Correo Institucional*</label
        >
        <input
          class="glass-input-mandatory w-full"
          placeholder="medico@km.com"
          type="email"
          formControlName="email"
        />
      </div>
      <div>
        <label
          class="block text-[11px] font-bold text-slate-500 mb-1.5 ml-1 uppercase"
          >CONTRASEÑA*</label
        >
        <select class="glass-input-mandatory w-full appearance-none">
          <option disabled="" selected="" value="">
            Seleccione especialidad
          </option>
          <option>Medicina General</option>
          <option>Nefrología</option>
          <option>Nutrición</option>
          <option>Medicina Interna</option>
          <option>Psicología Clínica</option>
        </select>
      </div>
      <div>
        <label
          class="block text-[11px] font-bold text-slate-500 mb-1.5 ml-1 uppercase"
          >Registro Médico / TP*</label
        >
        <input
          class="glass-input-mandatory w-full"
          placeholder="TP-000000-X"
          type="text"
        />
      </div>
      <div>
        <label
          class="block text-[11px] font-bold text-slate-500 mb-1.5 ml-1 uppercase"
          >Contraseña Provisoria*</label
        >
        <input
          class="glass-input-mandatory w-full"
          placeholder="••••••••"
          type="password"
        />
      </div>
    </div>
  </section>

  <section class="space-y-6">
    <h4
      class="text-slate-400 font-bold text-sm flex items-center gap-2 uppercase tracking-wider"
    >
      <span class="w-1.5 h-6 bg-slate-200 rounded-full"></span>
      DATOS PROFESIONALES (OPCIONAL)
    </h4>
    <div class="space-y-4">
      <div>
        <label
          class="block text-[11px] font-bold text-slate-400 mb-1.5 ml-1 uppercase"
          >ESPECIALIDAD</label
        >
        <input
          class="glass-input-optional w-full"
          placeholder="Ej. Nefrología"
          type="text"
          formControlName="specialty"
        />
      </div>
      <div>
        <label
          class="block text-[11px] font-bold text-slate-400 mb-1.5 ml-1 uppercase"
          >REGISTRO MÉDICO / TP</label
        >
        <input
          class="glass-input-optional w-full"
          placeholder="TP-000000-X"
          type="text"
          formControlName="licenseNumber"
        />
      </div>
      <div>
        <label
          class="block text-[11px] font-bold text-slate-400 mb-1.5 ml-1 uppercase"
          >Número de Cédula</label
        >
        <input
          class="glass-input-optional w-full"
          placeholder="1.234.567.890"
          type="text"
          formControlName="documentNumber"
        />
      </div>
      <div>
        <label
          class="block text-[11px] font-bold text-slate-400 mb-1.5 ml-1 uppercase"
          >Teléfono de Contacto</label
        >
        <input
          class="glass-input-optional w-full"
          placeholder="+57 300 123 45 67"
          type="tel"
          formControlName="phone"
        />
      </div>
      <div>
        <label
          class="block text-[11px] font-bold text-slate-400 mb-1.ROVEEDOR5 ml-1 upProveedorpercasROVEEDORProveedore"
          >Consultorio Asignado</label
        >
        <input
          class="glass-input-optional w-full"
          placeholder="Sede / Módulo"
          type="text"
        />
      </div>
    </div>
  </section>

  <div class="md:col-span-2 flex gap-4 pt-4">
    <button
      type="submit"
      [disabled]="isSubmitting || providerForm.invalid"
      class="flex-1 bg-primary text-white px-6 py-3 rounded-lg font-bold hover:bg-primary/90 disabled:opacity-50 disabled:cursor-not-allowed transition"
    >
      {{ isSubmitting ? "Creando Proveedor..." : "Crear Proveedor" }}
    </button>
    <button
      type="button"
      (click)="resetForm()"
      class="flex-1 bg-slate-200 text-slate-700 px-6 py-3 rounded-lg font-bold hover:bg-slate-300 transition"
    >
      Limpiar
    </button>
  </div>
</form>
