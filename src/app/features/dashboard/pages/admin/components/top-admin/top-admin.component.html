<header
	id="tour-top-admin"
	class="flex justify-between items-center mb-8 glass-panel px-6 py-4"
>
	<div class="flex items-center gap-3">
		<button
			type="button"
			(click)="toggleSidebar()"
			class="p-2 rounded-md hover:bg-slate-200 flex"
			aria-label="Toggle sidebar"
		>
			<span class="material-symbols-outlined">menu</span>
		</button>
		<div>
			<h2 class="text-2xl font-bold text-primary">{{ sectionTitle }}</h2>
			<p class="text-slate-500 text-sm">{{ sectionSubtitle }}</p>
		</div>
	</div>
	<div class="flex items-center gap-4">
		<button
			id="tour-btn-admin"
			type="button"
			(click)="helpClicked.emit()"
			class="p-2 rounded-full bg-primary/10 hover:bg-primary/20 text-primary flex items-center justify-center"
			aria-label="Iniciar visita guiada"
			title="Visita guiada"
		>
			<span class="material-symbols-outlined text-base">help</span>
		</button>
		<div class="flex items-center gap-3">
			<div class="text-right hidden sm:block">
				<p class="text-sm font-bold text-slate-800">{{ userDisplayName }}</p>
				<p class="text-xs text-slate-500">
					{{ primaryRole | titlecase }}
				</p>
			</div>
			<div
				class="w-10 h-10 rounded-full bg-slate-200 border-2 border-white shadow-md overflow-hidden flex items-center justify-center"
			>
				@if (photoUrl) {
					<ng-container>
						<img
							[src]="photoUrl"
							alt="Profile"
							class="w-full h-full object-cover"
						/>
					</ng-container>
				} @else {
					<ng-template>
						<span class="text-primary font-bold text-lg">{{ initials }}</span>
					</ng-template>
				}
			</div>
		</div>
	</div>
</header>
