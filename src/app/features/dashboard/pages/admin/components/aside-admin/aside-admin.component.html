<aside
  class="relative z-10 w-64 h-full hidden lg:flex flex-col border-r border-white/40 bg-white/60 backdrop-blur-md p-6"
>
  <div class="flex items-center mb-6 px-2">
    <img
      src="assets/img/logo.png"
      srcset="assets/img/logo.png 1x, assets/img/logo.png 2x"
      width="150"
      loading="lazy"
      alt="Kidney Medicine logo"
      class="rounded-lg object-contain"
    />
  </div>
  <nav class="space-y-1.5 flex-1 overflow-y-auto pr-2">
    <a
      (click)="setActive(0)"
      [class.active]="activeIndex === 0"
      class="sidebar-item cursor-pointer"
    >
      <span class="material-symbols-outlined">dashboard</span>
      Dashboard
    </a>
    <a
      (click)="setActive(1)"
      [class.active]="activeIndex === 1"
      class="sidebar-item cursor-pointer"
    >
      <span class="material-symbols-outlined">medical_services</span>
      Servicios
    </a>
    <a
      (click)="setActive(2)"
      [class.active]="activeIndex === 2"
      class="sidebar-item cursor-pointer"
    >
      <span class="material-symbols-outlined">group</span>
      Usuarios
    </a>
    <a
      (click)="setActive(3)"
      [class.active]="activeIndex === 3"
      class="sidebar-item cursor-pointer"
    >
      <span class="material-symbols-outlined">article</span>
      Artículos Educativos
    </a>
    <a
      (click)="setActive(4)"
      [class.active]="activeIndex === 4"
      class="sidebar-item cursor-pointer"
    >
      <span class="material-symbols-outlined">calendar_month</span>
      Citas
    </a>
    <a
      (click)="setActive(5)"
      [class.active]="activeIndex === 5"
      class="sidebar-item cursor-pointer"
    >
      <span class="material-symbols-outlined">biotech</span>
      Laboratorios
    </a>
    <a
      (click)="setActive(6)"
      [class.active]="activeIndex === 6"
      class="sidebar-item cursor-pointer"
    >
      <span class="material-symbols-outlined">science</span>
      Resultados
    </a>
    <a
      (click)="setActive(7)"
      [class.active]="activeIndex === 7"
      class="sidebar-item cursor-pointer"
    >
      <span class="material-symbols-outlined">settings</span>
      Configuraciones
    </a>
  </nav>
  <div class="mt-auto pt-6 border-t border-slate-200/50">
    <a
      (click)="setActive(8)"
      [class.active]="activeIndex === 8"
      class="sidebar-item cursor-pointer"
    >
      <span class="material-symbols-outlined">headset_mic</span>
      Soporte y contacto
    </a>
    <a
      (click)="setActive(9)"
      [class.active]="activeIndex === 9"
      class="sidebar-item text-secondary hover:bg-red-50 hover:text-red-700 mt-2 cursor-pointer"
    >
      <span class="material-symbols-outlined">logout</span>
      Cerrar Sesión
    </a>
  </div>
</aside>
