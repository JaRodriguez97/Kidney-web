<div class="fixed inset-0 z-50" [ngClass]="{ hidden: !visible }">
	<div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"></div>
	<div class="absolute inset-0 flex items-center justify-center p-4">
		<div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl overflow-hidden">
			<div
				class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50"
			>
				<h3 class="text-lg font-bold text-primary">Crear Versión</h3>
				<button class="text-slate-400 hover:text-secondary" (click)="onClose()">
					<span class="material-symbols-outlined">close</span>
				</button>
			</div>

			<form class="p-6 space-y-4" (ngSubmit)="onSubmit()">
				<div>
					<label class="block text-sm font-semibold text-slate-700 mb-1">
						Notas de versión
					</label>
					<textarea
						[(ngModel)]="releaseNotes"
						name="releaseNotes"
						rows="3"
						placeholder="Resumen corto de cambios para esta versión"
						class="w-full rounded-lg border border-slate-300 bg-slate-50 text-slate-900 focus:ring-primary focus:border-primary p-3"
					></textarea>
				</div>

				<div class="rounded-xl border border-slate-200 overflow-hidden">
					<div class="px-4 py-3 bg-slate-50 text-sm font-semibold text-slate-700">
						Bloques incluidos en esta versión
					</div>
					<div class="max-h-72 overflow-y-auto divide-y divide-slate-100">
						<label
							*ngFor="let block of availableBlocks; trackBy: trackByBlock"
							class="px-4 py-3 flex items-start gap-3 cursor-pointer hover:bg-slate-50"
						>
							<input
								type="checkbox"
								[checked]="isSelected(block.id)"
								(change)="toggleSelection(block.id, $any($event.target).checked)"
								class="mt-0.5 h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary"
							/>
							<div>
								<div class="text-sm font-semibold text-slate-800">{{ block.name }}</div>
								<div class="text-xs text-slate-500 font-mono">
									{{ block.code || 'SIN_CODIGO' }}
								</div>
								<div class="text-xs text-slate-500 mt-0.5">
									Template dueño: {{ block.templateName }} | Campos:
									{{ block.fieldsCount }}
								</div>
							</div>
						</label>
						<div
							*ngIf="availableBlocks.length === 0"
							class="px-4 py-6 text-sm text-slate-500 text-center"
						>
							No hay bloques disponibles para seleccionar.
						</div>
					</div>
				</div>

				<div
					*ngIf="errorMessage"
					class="px-3 py-2 rounded-lg bg-red-50 text-secondary border border-red-100 text-sm"
				>
					{{ errorMessage }}
				</div>

				<div class="pt-2 flex justify-end gap-3">
					<button
						type="button"
						(click)="onClose()"
						class="px-4 py-2 rounded-lg text-slate-600 font-medium hover:bg-slate-200 transition-colors"
					>
						Cancelar
					</button>
					<button
						type="submit"
						[disabled]="loading"
						class="px-4 py-2 rounded-lg bg-primary text-white font-medium hover:bg-primary/90 transition-colors disabled:opacity-60 disabled:cursor-not-allowed"
					>
						{{ loading ? 'Guardando...' : 'Crear versión' }}
					</button>
				</div>
			</form>
		</div>
	</div>
</div>
