<div class="w-full max-w-2xl rounded-2xl border border-white/50 bg-white/95 shadow-2xl overflow-hidden">
	<div class="px-6 py-4 border-b border-slate-200/70 flex items-start justify-between gap-4">
		<div>
			<h4 class="text-lg font-bold text-slate-800">Programar Laboratorio</h4>
			<p class="text-sm text-slate-500">
				Componente habilitado para integrar tu template final.
			</p>
		</div>
		<button
			type="button"
			class="p-2 rounded-lg text-slate-400 hover:bg-slate-100 hover:text-slate-600"
			(click)="onClose()"
		>
			<span class="material-symbols-outlined">close</span>
		</button>
	</div>

	<div class="px-6 py-5 space-y-4">
		<div class="rounded-xl border border-slate-200 bg-slate-50/70 p-4">
			<p class="text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">
				Fecha sugerida
			</p>
			<p class="text-sm font-semibold text-slate-800">
				{{ selectedDate || 'Sin fecha seleccionada' }}
			</p>
		</div>
		<div class="rounded-xl border border-primary/20 bg-primary/5 p-4">
			<p class="text-sm text-primary font-medium">
				Aqui puedes adaptar tu template para el flujo completo de programacion.
			</p>
		</div>
	</div>

	<div class="px-6 py-4 border-t border-slate-200/70 flex justify-end bg-slate-50/60">
		<button
			type="button"
			class="px-4 py-2 rounded-lg bg-primary text-white text-sm font-bold hover:bg-slate-800"
			(click)="onClose()"
		>
			Cerrar
		</button>
	</div>
</div>
