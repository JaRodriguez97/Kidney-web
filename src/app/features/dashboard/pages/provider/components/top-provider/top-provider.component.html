<header
	id="tour-top-provider"
	class="flex justify-between items-center mb-8 glass-panel px-6 py-4"
>
	<div>
		<h2 class="text-2xl font-bold text-primary">{{ sectionTitle }}</h2>
		<p class="text-slate-500 text-sm">{{ sectionSubtitle }}</p>
	</div>
	<div class="flex items-center gap-4">
		<button
			id="tour-btn-provider"
			type="button"
			(click)="helpClicked.emit()"
			class="p-2 rounded-full bg-primary/10 hover:bg-primary/20 text-primary flex items-center justify-center"
			aria-label="Iniciar visita guiada"
			title="Visita guiada"
		>
			<span class="material-symbols-outlined text-base">help</span>
		</button>
		<div class="flex items-center gap-3">
			<div class="text-right hidden sm:block">
				<p class="text-sm font-bold text-slate-800">{{ userDisplayName }}</p>
				<p class="text-xs text-slate-500">
					{{ providerTypeLabel | titlecase }}
				</p>
			</div>
			<div
				class="w-10 h-10 rounded-full bg-slate-200 border-2 border-white shadow-md overflow-hidden relative flex items-center justify-center"
			>
				<span class="text-primary font-bold text-sm">{{ initials }}</span>
				<div
					class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"
				></div>
			</div>
		</div>
	</div>
</header>
