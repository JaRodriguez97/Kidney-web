<header
	id="tour-top-patient"
	class="bg-white/60 backdrop-blur-md border border-white/60 shadow-sm rounded-3xl p-4 sm:px-6 sm:py-4 mb-6 flex flex-col sm:flex-row justify-between items-center gap-4"
>
	<div>
		<h2 class="text-2xl font-bold text-slate-800">{{ sectionTitle }}</h2>
		<p class="text-slate-400 text-sm mt-0.5">{{ sectionSubtitle }}</p>
	</div>
	<div class="flex items-center gap-4">
		<div
			id="tour-privacy-badge"
			class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-2 border border-green-200"
		>
			<span class="material-symbols-outlined text-sm">verified_user</span>
			Privacidad de Datos Garantizada
		</div>
		<div class="w-px h-8 bg-slate-200 mx-2"></div>
		<button
			id="tour-btn-patient"
			type="button"
			(click)="helpClicked.emit()"
			class="p-2 rounded-full bg-primary_p/10 hover:bg-primary_p/20 text-primary_p flex items-center justify-center"
			aria-label="Iniciar visita guiada"
			title="Visita guiada"
		>
			<span class="material-symbols-outlined text-base">help</span>
		</button>
		<div class="flex items-center gap-3 pl-4 border-l border-slate-200/50">
			<div class="text-right hidden sm:block">
				<p class="text-sm font-bold text-slate-800">{{ userDisplayName }}</p>
				<p class="text-[11px] text-slate-400">{{ documentLabel }}</p>
			</div>
			<div
				class="w-10 h-10 rounded-full bg-slate-200 border-2 border-white shadow-sm overflow-hidden flex items-center justify-center"
			>
				<span class="text-primary_p font-bold text-sm">{{ initials }}</span>
			</div>
		</div>
	</div>
</header>
