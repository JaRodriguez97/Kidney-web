<section class="py-20 bg-background-light dark:bg-background-dark" id="contact">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div
      class="bg-primary rounded-3xl overflow-hidden shadow-2xl flex flex-col lg:flex-row"
    >
      <div
        class="lg:w-5/12 p-10 text-white flex flex-col justify-between bg-primary relative overflow-hidden"
      >
        <div
          class="absolute top-0 right-0 -mr-10 -mt-10 w-64 h-64 bg-white/10 rounded-full blur-3xl"
        ></div>
        <div class="relative z-10">
          <h3 class="text-3xl font-display font-bold mb-4">Contáctanos</h3>
          <p class="text-blue-100 mb-8">
            Agende una cita o pregunte sobre nuestros programas para aliados.
          </p>
          <div class="space-y-6">
            <div class="flex items-center">
              <span class="material-icons-round mr-4 text-blue-200"
                >location_on</span
              >
              <span>123 Av. Salud, Distrito Médico</span>
            </div>
            <div class="flex items-center">
              <span class="material-icons-round mr-4 text-blue-200">phone</span>
              <span>+1 (555) 123-4567</span>
            </div>
            <div class="flex items-center">
              <span class="material-icons-round mr-4 text-blue-200">email</span>
              <span>contacto{{ "@" }}kidneymed.sas</span>
            </div>
          </div>
        </div>
        <div class="mt-12 relative z-10">
          <p class="text-sm text-blue-200 mb-4">Síguenos</p>
          <div class="flex space-x-4">
            <a
              class="bg-white/20 p-2 rounded-full hover:bg-white/30 transition-colors group"
              href="#"
            >
              <i
                class="fa-brands fa-instagram text-xl text-white group-hover:scale-110 transition-transform"
              ></i>
            </a>
            <a
              class="bg-white/20 p-2 rounded-full hover:bg-white/30 transition-colors group"
              href="#"
            >
              <i
                class="fa-brands fa-youtube text-xl text-white group-hover:scale-110 transition-transform"
              ></i>
            </a>
            <a
              class="bg-white/20 p-2 rounded-full hover:bg-white/30 transition-colors group"
              href="#"
            >
              <i
                class="fa-brands fa-tiktok text-xl text-white group-hover:scale-110 transition-transform"
              ></i>
            </a>
          </div>
        </div>
      </div>
      <div class="lg:w-7/12 bg-white dark:bg-slate-900 p-10">
        <form class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <app-input-text
              formControlName="name"
              [disabled]="false"
              label="Nombre"
              placeholder="Juan"
            />
            <app-input-text
              formControlName="lastName"
              [disabled]="false"
              label="Apellido"
              placeholder="Pérez"
            />
          </div>
          <div>
            <app-input-email formControlName="email" [disabled]="false" />
          </div>
          <div>
            <app-select
              [options]="optionsSelectForm"
              label="Tipo de Consulta"
            />
          </div>
          <div>
            <app-textarea
              formControlName="message"
              label="Mensaje"
              placeholder="¿Cómo podemos ayudarte?"
              [maxLength]="200"
            />
          </div>
          <button
            class="w-full bg-slate-900 dark:bg-primary text-white font-bold py-3 px-4 rounded-xl hover:opacity-90 transition-opacity shadow-lg"
            type="button"
          >
            Enviar Mensaje
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
