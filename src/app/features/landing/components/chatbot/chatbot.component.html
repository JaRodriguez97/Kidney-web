<!-- Floating Button -->
<button
  (click)="toggleChat()"
  class="fixed bottom-6 right-6 w-14 h-14 bg-primary text-white rounded-full shadow-2xl hover:scale-105 transition-transform flex items-center justify-center z-50 animate-bounce-slow"
  [ngClass]="{'bg-slate-700': isOpen}"
  title="Chat de Ayuda"
>
  <span class="material-symbols-outlined text-3xl">
    {{ isOpen ? 'close' : 'chat' }}
  </span>
</button>

<!-- Chat Window -->
<div
  *ngIf="isOpen"
  class="fixed bottom-24 right-6 w-80 sm:w-96 bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden z-50 border border-slate-100 transition-all duration-300 transform origin-bottom-right"
  style="height: 500px; max-height: 80vh;"
>
  <!-- Header -->
  <div class="bg-primary text-white p-4 flex justify-between items-center shadow-md">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
        <span class="material-symbols-outlined text-xl">smart_toy</span>
      </div>
      <div>
        <h3 class="font-bold text-lg leading-tight">Asistente KM</h3>
        <p class="text-xs opacity-80">En línea</p>
      </div>
    </div>
    <button (click)="toggleChat()" class="text-white/80 hover:text-white transition-colors">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>

  <!-- Messages Area -->
  <div #chatScroll class="flex-1 p-4 overflow-y-auto bg-slate-50 flex flex-col gap-4">
    <div *ngFor="let msg of messages; let last = last" class="flex flex-col gap-2">
      <!-- Bot Message -->
      <div *ngIf="msg.isBot" class="flex items-end gap-2 max-w-[85%] self-start">
        <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center flex-shrink-0 text-primary mb-1">
          <span class="material-symbols-outlined text-sm">smart_toy</span>
        </div>
        <div class="bg-white border border-slate-100 text-slate-700 p-3 rounded-2xl rounded-bl-none shadow-sm text-sm">
          {{ msg.text }}
        </div>
      </div>

      <!-- User Message -->
      <div *ngIf="!msg.isBot" class="flex items-end gap-2 max-w-[85%] self-end">
        <div class="bg-primary text-white p-3 rounded-2xl rounded-br-none shadow-sm text-sm">
          {{ msg.text }}
        </div>
      </div>

      <!-- Options (only show if it's the last message and has options) -->
      <div *ngIf="msg.isBot && msg.options && last" class="pl-10 flex flex-col gap-2 mt-2 w-full animate-fade-in">
        <button
          *ngFor="let option of msg.options"
          (click)="handleOptionClick(option)"
          class="text-left w-full bg-white border border-primary/30 text-primary hover:bg-primary hover:text-white transition-colors px-4 py-2.5 rounded-xl text-sm font-medium shadow-sm"
        >
          {{ option.label }}
        </button>
      </div>
    </div>
  </div>
</div>
