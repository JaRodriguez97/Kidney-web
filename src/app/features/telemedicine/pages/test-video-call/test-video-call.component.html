<div class="min-h-screen w-full bg-slate-900 flex flex-col p-4 relative font-sans">
  
  <!-- Header -->
  <div class="text-center mb-6 pt-4">
    <h1 class="text-white text-3xl font-bold tracking-tight">Prueba Telemedicina P2P</h1>
    <div class="mt-2 inline-flex items-center gap-2 bg-slate-800 px-4 py-2 rounded-lg border border-slate-700">
      <span class="text-slate-400 text-sm">ID de Sala:</span>
      <span class="text-blue-400 font-mono font-bold">{{ sessionId }}</span>
    </div>
    <p class="text-slate-500 mt-3 text-sm">Comparte la misma URL con otra persona para iniciar el video.</p>
  </div>

  <!-- Video Grid -->
  <div class="flex-1 flex flex-col md:flex-row gap-4 w-full max-w-7xl mx-auto items-stretch justify-center pb-24">
    
    <!-- Remote Video -->
    <div class="flex-1 bg-black/50 rounded-2xl overflow-hidden relative border border-slate-700 shadow-2xl backdrop-blur flex items-center justify-center">
      <video #remoteVideo autoplay playsinline class="w-full h-full object-cover"></video>
      <div class="absolute bottom-4 left-4 bg-black/60 px-3 py-1.5 rounded-md text-white text-sm font-medium backdrop-blur shadow-sm">
        Usuario Remoto
      </div>
      <!-- Placeholder when empty -->
      <div *ngIf="!remoteVideo.srcObject" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
        <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mb-4 border border-slate-700 animate-pulse">
          <svg class="w-8 h-8 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </div>
        <p class="text-slate-500 font-medium">Esperando al otro usuario...</p>
      </div>
    </div>

    <!-- Local Video -->
    <div class="w-full md:w-[320px] lg:w-[400px] md:h-auto h-[300px] bg-black/50 rounded-2xl overflow-hidden relative border border-slate-700 shadow-xl flex-shrink-0">
      <video #localVideo autoplay playsinline muted class="w-full h-full object-cover scale-x-[-1]"></video>
      <div class="absolute bottom-4 left-4 bg-blue-600/80 px-3 py-1.5 rounded-md text-white text-sm font-medium backdrop-blur shadow-sm">
        Tú
      </div>
    </div>
  </div>

  <!-- Controles Inferiores -->
  <div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-slate-900 to-transparent flex justify-center gap-4 z-50">
    <button 
      (click)="toggleAudio()" 
      class="w-14 h-14 rounded-full transition-all flex items-center justify-center shadow-lg border relative group hover:scale-105"
      [ngClass]="isAudioEnabled ? 'bg-slate-800 border-slate-600 text-white hover:bg-slate-700' : 'bg-red-500/20 border-red-500 text-red-500 hover:bg-red-500/30'">
      <svg *ngIf="isAudioEnabled" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
      </svg>
      <svg *ngIf="!isAudioEnabled" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
      </svg>
      
      <!-- Tooltip -->
      <div class="absolute -top-10 left-1/2 -translate-x-1/2 px-2 py-1 bg-slate-800 text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">
        {{ isAudioEnabled ? 'Silenciar' : 'Activar Audio' }}
      </div>
    </button>

    <button 
      (click)="toggleVideo()" 
      class="w-14 h-14 rounded-full transition-all flex items-center justify-center shadow-lg border relative group hover:scale-105"
      [ngClass]="isVideoEnabled ? 'bg-slate-800 border-slate-600 text-white hover:bg-slate-700' : 'bg-red-500/20 border-red-500 text-red-500 hover:bg-red-500/30'">
      <svg *ngIf="isVideoEnabled" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
      </svg>
      <svg *ngIf="!isVideoEnabled" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
      </svg>

      <!-- Tooltip -->
      <div class="absolute -top-10 left-1/2 -translate-x-1/2 px-2 py-1 bg-slate-800 text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">
        {{ isVideoEnabled ? 'Apagar Cámara' : 'Encender Cámara' }}
      </div>
    </button>
  </div>
</div>
