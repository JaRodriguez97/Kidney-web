<div class="bg-medical-blur">
  <img
    src="../../../../../assets/img/bg-login.png"
    alt="Fondo técnico de laboratorio médico"
  />
  <div class="bg-medical-overlay"></div>
</div>
<main
  class="flex-grow flex items-center justify-center px-4 sm:px-6 lg:px-8 pt-4 overflow-y-auto custom-scrollbar"
>
  <div class="w-full max-w-md">
    <div
      class="glass-panel rounded-3xl overflow-hidden shadow-2xl flex flex-col relative"
    >
      <div class="w-full p-8 md:p-10">
        <div class="flex flex-col items-center mb-8">
          <div class="flex items-center gap-2 mb-4">
            <img
              src="assets/img/logo.png"
              srcset="assets/img/logo.png 1x, assets/img/logo.png 2x"
              width="150"
              loading="lazy"
              alt="Kidney Medicine logo"
              class="rounded-lg object-contain"
            />
          </div>
        </div>
        <div class="text-center mb-8">
          <h1
            class="text-2xl md:text-3xl font-bold text-slate-900 dark:text-white leading-tight"
          >
            {{ title }}
          </h1>
          <p class="mt-2 text-sm text-slate-600 dark:text-slate-300">
            {{ subtitle }}
          </p>
        </div>
        <form class="space-y-6" [formGroup]="form" (ngSubmit)="submit()">
          <div>
            <app-input-email formControlName="email" icon="email" />
          </div>
          <div>
            <app-input-password formControlName="password" icon="lock" />

            <div class="flex justify-end mt-2">
              <a
                class="text-sm font-semibold text-primaryF hover:text-sky-700 hover:underline"
                [routerLink]="['/recovery-password']"
              >
                ¿Olvidaste tu contraseña?
              </a>
            </div>
          </div>
          <div class="pt-2">
            <button
              class="w-full bg-primaryF hover:bg-sky-600 text-white text-lg font-bold py-4 rounded-xl shadow-lg shadow-primaryF/30 transition-all transform hover:-translate-y-1"
              type="submit"
            >
              Ingresar
            </button>
          </div>
          @if (isPatient) {
            <div class="text-center mt-6">
              <p class="text-slate-600 dark:text-slate-300">
                ¿Aún no tienes cuenta?
                <a
                  class="text-primaryF font-semibold hover:text-sky-700 hover:underline transition-colors"
                  [routerLink]="['/register/patient']"
                  >Regístrate aquí</a
                >
              </p>
            </div>
          }
        </form>
      </div>
    </div>
    <div
      class="flex justify-center gap-4 mt-5 text-xs text-slate-500 dark:text-slate-400"
    >
      <a class="hover:text-primaryF hover:underline text-white" href="#"
        >Privacidad</a
      >
      <span>•</span>
      <a class="hover:text-primaryF hover:underline text-white" href="#"
        >Ayuda</a
      >
    </div>
  </div>
</main>
