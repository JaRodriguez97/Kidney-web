<section
	class="font-sans text-slate-800 antialiased h-screen overflow-hidden flex items-center justify-center"
>
	<main
		class="relative z-10 w-full h-full flex items-center justify-center p-6"
	>
		<div
			class="glass-form w-full max-w-lg p-10 md:p-14 relative overflow-hidden"
		>
			<div
				class="absolute -top-24 -right-24 w-48 h-48 bg-primary/10 rounded-full blur-3xl"
			></div>
			<div
				class="absolute -bottom-24 -left-24 w-48 h-48 bg-secondary/10 rounded-full blur-3xl"
			></div>
			<div class="relative z-10 text-center">
				<div class="w-20 h-20 flex items-center justify-center mb-8">
					<img src="../../../../../assets/img/logo3.jpg" alt="" />
				</div>
				<h2 class="text-2xl md:text-3xl font-extrabold text-slate-800 mb-3">
					Bienvenido al ecosistema de aliados Kidney Medicine
				</h2>
				<p class="text-slate-500 mb-10 text-lg">
					Acceda a la plataforma de gestión clínica y diagnóstica
				</p>
				<form
					class="space-y-6 text-left"
					[formGroup]="form"
					(ngSubmit)="submit()"
				>
					<div class="space-y-2">
						<label class="text-sm font-bold text-slate-700 ml-1" for="email"
							>Correo Corporativo</label
						>
						<div class="relative group">
							<span
								class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors z-10"
								>business</span
							>
							<input
								class="pl-12 input-field"
								id="email"
								placeholder="ej. contacto@ips-aliada.com"
								type="email"
								formControlName="email"
							/>
						</div>
					</div>
					<div class="space-y-2">
						<label class="text-sm font-bold text-slate-700 ml-1" for="password"
							>Contraseña</label
						>
						<div class="relative group">
							<span
								class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors z-10"
								>lock</span
							>
							<input
								class="input-field pl-12"
								id="password"
								placeholder="••••••••••••"
								type="password"
								formControlName="password"
							/>
						</div>
					</div>
					@if (errorMessage) {
						<p class="text-sm text-red-600" role="alert">{{ errorMessage }}</p>
					}
					<div class="pt-4">
						<button class="btn-primary-km" type="submit" [disabled]="loading">
							Ingresar como Aliado
						</button>
					</div>
					<div
						class="flex flex-col items-center gap-4 mt-8 pt-6 border-t border-slate-200/50"
					>
						<a
							class="text-sm font-semibold text-primary_p hover:text-primary_p/80 transition-colors flex items-center gap-1"
							href="#"
						>
							Solicitar acceso de aliado
						</a>
						<a
							class="text-sm text-slate-500 hover:text-slate-700 transition-colors"
							href="#"
						>
							¿Olvidó su contraseña corporativa?
						</a>
					</div>
				</form>
			</div>
		</div>
	</main>
</section>
