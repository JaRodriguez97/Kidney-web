<div class="bg-medical-blur absolute z-0 inset-0 left-0 w-full h-full">
  <img
    alt="Fondo técnico de laboratorio médico"
    class="object-cover w-full h-full"
    src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXIT1XEt0E09YnxqlLldKsGNnYpXV2pp89ZxeI-vqrgBNyxpKG5GZ8V0f16ooYxybW0YJ9e81K_sbZm7CwymTcJttjL3WqcJlWsqxLAlBQgYPIugoSvySKvJGc4ykws7Y-wKRm-qnUCtgVwHLY9G7ZQhDMbHzhR-rs1TKs1O_ozJ_h0cIYLBA2cXvcEeqJebEUW_CRa_Af0E3UrFfo2KgfKlGPPa-b-N2auCCvJBz2fMDxy3dgR6U1hXZyiB8CPUh2-q2hw_6MacM"
  />
  <div class="bg-medical-overlay"></div>
</div>
<main
  class="flex-grow flex items-center justify-center p-4 sm:p-6 lg:p-8 pt-12 pb-12 overflow-y-auto custom-scrollbar"
>
  <div class="w-full max-w-md">
    <div
      class="glass-panel rounded-3xl overflow-hidden shadow-2xl flex flex-col relative"
    >
      <div class="w-full p-8 md:p-10">
        <div class="flex flex-col items-center mb-6">
          <div class="flex items-center gap-2 mb-3">
            <div class="flex items-center gap-2 mb-4">
              <img
                src="assets/img/logo.png"
                srcset="assets/img/logo.png 1x, assets/img/logo.png 2x"
                width="150"
                loading="lazy"
                alt="Kidney Medicine logo"
                class="rounded-lg object-contain"
              />
            </div>
          </div>
        </div>
        <div class="text-center mb-8">
          <h1
            class="text-2xl md:text-3xl font-bold text-slate-900 dark:text-white leading-tight mb-3"
          >
            Recupera el acceso a tu salud
          </h1>
          <p
            class="text-slate-600 dark:text-slate-300 text-sm md:text-base leading-relaxed"
          >
            Ingresa tu correo electrónico registrado para recibir las
            instrucciones de restablecimiento.
          </p>
        </div>
        <form class="space-y-6">
          <div>
            <label
              class="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-2"
              >Correo electrónico</label
            >
            <div class="relative">
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <span class="material-icons-round text-slate-400">email</span>
              </div>
              <input
                class="w-full pl-10 px-4 py-3 rounded-xl border border-slate-500 dark:border-slate-400 bg-white/50 dark:bg-slate-800/50 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder-slate-400 text-lg"
                placeholder="paciente@ejemplo.com"
                required=""
                type="email"
              />
            </div>
          </div>
          <div class="pt-2">
            <button
              class="w-full bg-primary hover:bg-sky-600 text-white text-lg font-bold py-4 rounded-xl shadow-lg shadow-primary/30 transition-all transform hover:-translate-y-1"
              type="submit"
            >
              Enviar instrucciones
            </button>
          </div>
          <div class="text-center mt-6">
            <a
              class="inline-flex items-center gap-2 text-slate-600 dark:text-slate-300 font-medium hover:text-primary transition-colors text-sm"
              [routerLink]="['/login/patient']"
            >
              <span class="material-icons-round text-base">arrow_back</span>
              Volver al inicio de sesión
            </a>
          </div>
        </form>
      </div>
    </div>
    <div class="text-center mt-8 pb-4 z-10 relative">
      <!-- <p class="text-slate-600 dark:text-slate-400 text-sm drop-shadow-md">
        © 2024 Kidney Medicine SAS. Todos los derechos reservados.
      </p> -->
      <div
        class="flex justify-center gap-4 mt-2 text-xs text-slate-500 dark:text-slate-400"
      >
        <a class="hover:text-primary hover:underline text-white" href="#"
          >Privacidad</a
        >
        <span>•</span>
        <a class="hover:text-primary hover:underline text-white" href="#"
          >Ayuda</a
        >
      </div>
    </div>
  </div>
</main>
