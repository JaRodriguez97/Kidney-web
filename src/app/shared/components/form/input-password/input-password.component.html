<label
  class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1"
>
  {{ label }}

  <div class="relative">
    @if (icon) {
      <div
        class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
      >
        <span class="material-icons-round text-slate-400">
          {{ icon }}
        </span>
      </div>
    }

    <input
      [type]="inputType"
      [value]="value"
      [placeholder]="placeholder"
      [required]="required"
      [disabled]="disabled"
      (input)="handleInput($event)"
      (blur)="onTouched()"
      class="w-full rounded-lg border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-primary focus:border-primary p-4"
      [class.pl-10]="icon"
      [class.border-red-500]="showError"
    />

    <button
      type="button"
      (click)="toggleVisibility()"
      class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 focus:outline-none"
      [disabled]="disabled"
    >
      <span class="material-icons-round">
        {{ showPassword ? "visibility_off" : "visibility" }}
      </span>
    </button>
  </div>
</label>
